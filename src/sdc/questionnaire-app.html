<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FHIR Questionnaire</title>
    <link
      rel="stylesheet"
      href="https://cdn.tiro.health/sdk/latest/tiro-web-sdk.css"
    />
    <script src="https://cdn.tiro.health/sdk/latest/tiro-web-sdk.iife.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
      }

      #loading {
        padding: 2rem;
        text-align: center;
        color: #6b7280;
        font-size: 0.875rem;
      }

      #error {
        display: none;
        padding: 2rem;
        text-align: center;
        color: #dc2626;
        font-size: 0.875rem;
      }

      #form-container {
        display: none;
      }

      tiro-form-filler {
        display: block;
      }

      #send-to-editor {
        display: inline-block;
        margin: 0.75rem 0;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-family: inherit;
        color: #fff;
        background-color: #2563eb;
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
      }

      #send-to-editor:hover:not(:disabled) {
        background-color: #1d4ed8;
      }

      #send-to-editor:disabled {
        opacity: 0.6;
        cursor: default;
      }
    </style>
